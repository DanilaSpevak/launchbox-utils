name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify exact candidate checkout
        shell: pwsh
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          $actualSha = git rev-parse HEAD
          if ($actualSha -ne $env:EXPECTED_SHA) {
            throw "Expected candidate $env:EXPECTED_SHA, checked out $actualSha"
          }
          "Verified candidate SHA: $actualSha" >> $env:GITHUB_STEP_SUMMARY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s test -p "test_*.py" -v
